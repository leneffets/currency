<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d2d2d">
    <meta name="description" content="Currency Converter - Convert currencies and calculate prices per weight">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Currency Converter">
    <title>Currency Converter</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="currency-row">
            <div class="field">
                <label for="sourceCurrency" id="sourceLabel"></label>
                <input type="text" id="sourceCurrency" list="currencyList" value="PLN" onchange="saveCurrencySettings(); updateExchangeRate(); performCalculations();" oninput="saveCurrencySettings(); updateExchangeRate(); performCalculations();">
            <datalist id="currencyList">
                <option value="PLN">Polish Zloty</option>
                <option value="USD">US Dollar</option>
                <option value="EUR">Euro</option>
                <option value="JPY">Japanese Yen</option>
                <option value="CHF">Swiss Franc</option>
                <option value="GBP">British Pound</option>
                <option value="CZK">Czech Koruna</option>
                <option value="DKK">Danish Krone</option>
                <option value="TRY">Turkish Lira</option>
                <option value="SEK">Swedish Krona</option>
                <option value="NOK">Norwegian Krone</option>
            </datalist>
            </div>
            <button type="button" id="swapCurrency" class="swap-button" title="Swap currencies" onclick="swapCurrencies()">⇄</button>
            <div class="field">
                <label for="targetCurrency" id="targetLabel"></label>
                <input type="text" id="targetCurrency" list="currencyList" value="EUR" onchange="saveCurrencySettings(); updateExchangeRate(); performCalculations();" oninput="saveCurrencySettings(); updateExchangeRate(); performCalculations();">
            </div>
        </div>

        <div class="price-row">
            <label for="price" id="priceLabel"></label>
            <div class="input-with-button">
                <input type="number" id="price" placeholder="e.g. 10" step="0.01" inputmode="decimal" pattern="[0-9]*([.,][0-9]+)?" oninput="performCalculations()">
                <button type="button" id="resetButton" class="reset-button" title="" aria-label="" onclick="resetInputs()">🧹</button>
            </div>
        </div>

        <details id="optionalDetails" class="optional-details">
            <summary id="optionalSummary"></summary>

            <label for="bankenrate" id="bankenrateLabel"></label>
            <input type="number" id="bankenrate" placeholder="e.g. 2" step="0.01" min="0" inputmode="decimal" pattern="[0-9]*([.,][0-9]+)?" oninput="onOptionalInput()">


            <label for="weight" id="weightLabel"></label>
            <input type="number" id="weight" placeholder="e.g. 200" step="0.01" inputmode="decimal" pattern="[0-9]*([.,][0-9]+)?" oninput="onOptionalInput()">

            <label for="unitWeight" id="unitWeightLabel"></label>
            <input type="number" id="unitWeight" placeholder="e.g. 250" step="0.01" inputmode="decimal" pattern="[0-9]*([.,][0-9]+)?" oninput="onOptionalInput()">
        </details>

        <label for="exchangeRate" id="exchangeRateLabel"></label>
        <div class="exchange-container">
            <input type="text" id="exchangeRate" readonly>
            <button class="refresh-button" id="refreshRate" title="Update exchange rate" onclick="updateExchangeRate()">🔄</button>
        </div>
        <div class="exchange-info" id="exchangeInfo"></div>

        <div class="output" id="output"></div>
        <button id="installButton" class="install-badge" style="display:none;" title="Install app">📱 Install the app</button>
    </div>
</body>
</html>
